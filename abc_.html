        qian: new Set([3072, 8, 9, 10, 1544, 1545, 3593, 3594, 532, 533, 541, 542, 552, 553, 2609, 2610, 2612, 2613, 1591, 1592, 1596, 1597, 1611, 1612, 1613, 2123, 2124, 80, 81, 2125, 3147, 3148, 2652, 2653, 613, 614, 615, 104, 105, 1126, 1127, 2149, 2150, 3688, 3689, 3187, 3188, 3702, 3703, 632, 633, 2176, 2177, 1667, 1668, 3719, 3720, 663, 664, 1175, 1176, 1177, 3224, 3225, 1182, 1183, 169, 170, 186, 187, 698, 699, 198, 199, 710, 711, 2760, 2761, 2258, 2259, 1756, 1757, 2270, 2271, 1249, 1250, 3812, 2277, 2278, 3813, 2280, 2281, 1773, 1774, 3319, 3320, 253, 254, 2814, 2815, 2822, 2823, 1800, 1801, 3357, 3358, 802, 803, 1315, 1316, 1846, 1847, 3402, 3403, 863, 864, 865, 866, 2911, 2912, 2407, 2408, 3435, 3436, 3443, 3444, 2436, 2437, 2949, 2950, 1423, 1424, 2453, 2454, 1953, 1954, 3491, 3492, 1448, 1449, 2992, 2993, 1461, 1462, 3002, 3003, 1982, 1983, 960, 961, 3526, 3527, 2526, 2527, 2528, 3046, 3047, 2024, 2025, 1006, 1007, 2035, 2036, 3071]),
        bai: new Set([512, 1024, 1537, 1538, 2562, 2563, 510, 1023, 1053, 1054, 1567, 1568, 2041, 2590, 2591, 2592, 3614, 3615, 2608, 2609, 52, 53, 3126, 3127, 2619, 2620, 66, 67, 68, 1090, 1091, 80, 81, 1108, 1109, 2647, 2648, 607, 608, 2658, 2659, 1636, 1637, 614, 615, 2660, 2666, 2667, 3192, 3193, 3194, 3199, 3200, 3213, 3214, 2201, 2202, 2713, 2714, 3225, 3226, 3738, 2208, 2209, 3739, 2737, 2738, 696, 697, 728, 729, 3801, 3802, 2790, 2791, 2817, 2818, 1802, 1803, 1296, 1297, 1298, 787, 788, 1808, 1809, 1309, 1310, 2846, 2847, 3362, 3363, 3365, 2342, 2343, 3366, 306, 307, 1331, 1332, 2871, 2872, 3384, 3385, 837, 838, 1877, 1878, 2908, 2909, 2910, 1395, 1396, 383, 384, 385, 386, 1923, 1924, 2943, 2944, 1927, 1928, 2959, 2960, 3492, 3493, 3494, 1450, 1451, 1991, 456, 457, 1992, 3527, 3528, 973, 974, 975, 2003, 2004, 3543, 3544, 2009, 2010, 2533, 1510, 1511, 2534, 493, 494, 2541, 2542, 2543, 3056, 3057, 504, 505, 2042, 2044, 2045, 1022, 511]),
        shi: new Set([3080, 9, 10, 3081, 2579, 1556, 1557, 2580, 2591, 1056, 1057, 2592, 40, 41, 2094, 2095, 2606, 2607, 3063, 83, 84, 599, 600, 97, 98, 1132, 1133, 1646, 1647, 2160, 2161, 1146, 1147, 3718, 3719, 3209, 3210, 3211, 2704, 2705, 157, 158, 1697, 1698, 1699, 164, 165, 166, 3749, 3750, 3751, 3254, 3255, 3256, 3773, 190, 191, 3774, 2764, 2765, 3292, 2269, 222, 1759, 1760, 223, 2270, 3293, 741, 742, 2790, 2791, 2792, 2793, 2794, 3301, 3302, 2291, 2292, 2316, 2317, 1806, 1807, 2834, 2835, 1813, 1814, 2839, 2840, 801, 802, 2852, 2853, 2854, 1323, 1324, 1325, 2867, 2868, 1857, 1858, 1860, 1861, 851, 852, 2391, 2392, 351, 352, 2410, 2411, 2925, 2926, 891, 892, 902, 903, 1926, 1927, 1928, 2950, 2951, 1935, 1936, 1937, 3479, 1944, 1945, 922, 923, 3480, 931, 932, 2980, 2981, 2982, 3509, 3510, 442, 443, 1980, 1981, 3003, 3004, 961, 962, 3536, 3537, 980, 981, 472, 473, 985, 986, 3036, 3037, 1505, 1506, 1511, 1512, 1011, 1012, 3060, 3061, 3062, 3067, 3068]),
        ge: new Set([3073, 3074, 1029, 1030, 1543, 1544, 2057, 2058, 532, 533, 553, 554, 560, 561, 3638, 3639, 2104, 2105, 2620, 2621, 2622, 3644, 3645, 3646, 2633, 2634, 1624, 1625, 2137, 2138, 94, 95, 96, 97, 2152, 2153, 2181, 2182, 3717, 1160, 1161, 3718, 3719, 3216, 3217, 148, 149, 2716, 2717, 3238, 3239, 3240, 2747, 2748, 2749, 704, 705, 3776, 3777, 3790, 3791, 725, 726, 1751, 1752, 3292, 2269, 2270, 3293, 1803, 1804, 1304, 1305, 1311, 1312, 2350, 2351, 2866, 2867, 2868, 3378, 3379, 1338, 1339, 845, 846, 1891, 1892, 870, 871, 1434, 1435, 1436, 3491, 3492, 2990, 2991, 1971, 1972, 2996, 2997, 3514, 3515, 1984, 1985, 3015, 3016, 3527, 3528, 975, 976, 3028, 3029, 3050, 3051, 3052, 3058, 3059, 3571, 3061, 3062, 3572, 505, 506, 1020, 1021])
    };
    const positions = ['万位', '千位', '百位', '十位', '个位'];
    const posKeys = ['wan', 'qian', 'bai', 'shi', 'ge'];
    
    let singleModeActive = false;
    let singleModePosKey = null;
    
    function getTotalPages() {
        if (!currentData) return 1;
        return Math.ceil(currentData.periods.length / pageSize);
    }
    
    function drawChartOnCanvas(canvas, values, periods, startRow, rows, posKey, isLarge) {
        const ctx = canvas.getContext('2d');
        const cols = 10;
        const cellW = isLarge ? 36 : 24;
        const cellH = isLarge ? 30 : 22;
        const leftMargin = isLarge ? 100 : 75;
        const topMargin = isLarge ? 50 : 35;
        const width = leftMargin + cols * cellW + 20;
        const height = topMargin + rows * cellH + 20;
        canvas.width = width;
        canvas.height = height;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.clearRect(0, 0, width, height);
        
        ctx.font = isLarge ? '14px Arial' : '11px Arial';
        ctx.fillStyle = '#333';
        ctx.textAlign = 'center';
        for (let c=0; c<cols; c++) {
            ctx.fillText(c.toString(), leftMargin + c*cellW + cellW/2, topMargin - 10);
        }
        
        const points = [];
        const currentHighlights = highlights[posKey] || new Set();
        for (let r=0; r<rows; r++) {
            const globalRow = startRow + r;
            const period = periods[globalRow];
            const num = values[globalRow];
            const y = topMargin + r*cellH;
            ctx.fillStyle = '#333';
            ctx.font = isLarge ? '12px Arial' : '9px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(period, leftMargin-8, y+cellH/2);
            
            if ((globalRow + 1) % 5 === 0) {
                ctx.beginPath();
                ctx.moveTo(leftMargin, y+cellH);
                ctx.lineTo(leftMargin + cols*cellW, y+cellH);
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            const isHighlighted = currentHighlights.has(globalRow);
            for (let c=0; c<cols; c++) {
                const x = leftMargin + c*cellW;
                ctx.strokeStyle = '#ddd';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, cellW, cellH);
                if (num === c) {
                    if (isHighlighted) ctx.fillStyle = '#C6EFCE';
                    else ctx.fillStyle = '#f0ad4e';
                    ctx.fillRect(x, y, cellW, cellH);
                    ctx.fillStyle = 'white';
                    ctx.font = isLarge ? 'bold 14px Arial' : 'bold 11px Arial';
                    ctx.fillText(c.toString(), x+cellW/2, y+cellH/2);
                    points[r] = { x: x+cellW/2, y: y+cellH/2 };
                } else if (isHighlighted) {
                    ctx.fillStyle = '#C6EFCE';
                    ctx.fillRect(x, y, cellW, cellH);
                }
            }
        }
        
        ctx.beginPath();
        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 2;
        let firstPoint = null;
        for (let r=0; r<rows; r++) {
            if (points[r]) {
                if (firstPoint === null) {
                    firstPoint = points[r];
                    ctx.moveTo(firstPoint.x, firstPoint.y);
                } else {
                    ctx.lineTo(points[r].x, points[r].y);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(points[r].x, points[r].y);
                }
            } else {
                firstPoint = null;
                ctx.beginPath();
            }
        }
        if (points.length >= 2) ctx.stroke();
    }
    
    function drawChartToContainer(containerId, title, values, periods, startRow, rows, posKey) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = `<div class="chart-title">${title}</div><canvas id="canvas_${posKey}"></canvas>`;
        const canvas = document.getElementById(`canvas_${posKey}`);
        if (canvas) drawChartOnCanvas(canvas, values, periods, startRow, rows, posKey, false);
    }
    
    function drawAllCharts() {
        if (!currentData) return;
        const periods = currentData.periods;
        const totalRows = periods.length;
        const startRow = currentPage * pageSize;
        const endRow = Math.min(startRow+pageSize, totalRows);
        const rows = endRow - startRow;
        if (rows <= 0) return;
        const rowContainer = document.getElementById('chartsRow');
        rowContainer.innerHTML = '';
        for (let i=0; i<positions.length; i++) {
            const pos = positions[i];
            const key = posKeys[i];
            const values = currentData.positions[pos];
            const containerId = `chart_${key}`;
            const div = document.createElement('div');
            div.id = containerId;
            div.className = 'chart-container';
            div.style.minWidth = '300px';
            div.onclick = (function(k) { return function() { enterSingleMode(k); }; })(key);
            rowContainer.appendChild(div);
            drawChartToContainer(containerId, pos + '走势图', values, periods, startRow, rows, key);
        }
        const totalPages = getTotalPages();
        document.getElementById('pageInfo').innerHTML = `第 ${currentPage+1} / ${totalPages} 页`;
    }
    
    function enterSingleMode(posKey) {
        if (singleModeActive) return;
        singleModeActive = true;
        singleModePosKey = posKey;
        const posIndex = posKeys.indexOf(posKey);
        const posName = positions[posIndex];
        const values = currentData.positions[posName];
        const periods = currentData.periods;
        const totalRows = periods.length;
        const startRow = currentPage * pageSize;
        const endRow = Math.min(startRow+pageSize, totalRows);
        const rows = endRow - startRow;
        
        const wrapper = document.createElement('div');
        wrapper.id = 'singleModeWrapper';
        wrapper.className = 'single-mode-wrapper';
        wrapper.innerHTML = `
            <div class="single-mode-card">
                <span class="close-btn">&times;</span>
                <div style="font-size:20px; font-weight:bold; margin-bottom:15px;">${posName}走势图（点击关闭返回）</div>
                <canvas id="singleCanvas"></canvas>
                <div style="margin-top:15px; text-align:center; color:#666;">提示：点击右上角✕返回多图模式</div>
            </div>
        `;
        document.body.appendChild(wrapper);
        const canvas = document.getElementById('singleCanvas');
        if (canvas) drawChartOnCanvas(canvas, values, periods, startRow, rows, posKey, true);
        const closeBtn = wrapper.querySelector('.close-btn');
        closeBtn.onclick = () => exitSingleMode();
        wrapper.onclick = (e) => {
            if (e.target === wrapper) exitSingleMode();
        };
    }
    
    function exitSingleMode() {
        const wrapper = document.getElementById('singleModeWrapper');
        if (wrapper) wrapper.remove();
        singleModeActive = false;
        singleModePosKey = null;
        drawAllCharts();
    }
    
    function redrawSingleMode() {
        if (!singleModeActive) return;
        const posKey = singleModePosKey;
        const posIndex = posKeys.indexOf(posKey);
        const posName = positions[posIndex];
        const values = currentData.positions[posName];
        const periods = currentData.periods;
        const totalRows = periods.length;
        const startRow = currentPage * pageSize;
        const endRow = Math.min(startRow+pageSize, totalRows);
        const rows = endRow - startRow;
        const canvas = document.getElementById('singleCanvas');
        if (canvas) drawChartOnCanvas(canvas, values, periods, startRow, rows, posKey, true);
    }
    
    function changePage(delta) {
        const newPage = currentPage + delta;
        const totalPages = getTotalPages();
        if (newPage >= 0 && newPage < totalPages) {
            currentPage = newPage;
            drawAllCharts();
        }
    }
    
    document.getElementById('prevPage').onclick = () => changePage(-1);
    document.getElementById('nextPage').onclick = () => changePage(1);
    document.getElementById('pageSize').onchange = (e) => {
        pageSize = parseInt(e.target.value);
        currentPage = 0;
        drawAllCharts();
    };
    
    window.onload = () => {
        if (currentData) drawAllCharts();
    };
</script>
